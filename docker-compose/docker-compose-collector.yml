version: '3'
services:
  collector:    
    image: computingstack/computingstack-collector:2025-january    
    # When docker at a host has no egress due to dns, ufw or ip forwrd configration etc, you may choose host network, by uncommenting network mode to host, and comment out ports mapping between daesom host and listen port
    ports:
    - "{{ 3007  }}:{{ 3007 }}"
    # network_mode: host    
    healthcheck:
      test: curl --fail http://localhost:3007/getVersion || exit 1
      interval: 60s
      retries: 5
      #start_period: 20s
      timeout: 10s
    environment:
            #REGISTRY_AUTH: htpasswd
            #REGISTRY_AUTH_HTPASSWD_REALM: Registry
            #REGISTRY_AUTH_HTPASSWD_PATH: /auth/registry.password
            #REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /data
      db_host: 192.168.1.17
      db_user: uniview
      db_password: your_password
      db_database: uniview
      #rabbitmq_conn_url: amqp://intos:intos1@192.168.1.1:5672,amqp://intos:intos1@192.168.1.2:5672,amqp://intos:intos1@192.168.1.3:5672
      transport_url_nova: "rabbit://user:pass@192.168.1.17:5672"
      transport_url_neutron: "rabbit://user:pass@192.168.1.17:5672"
      transport_url_cinder: "rabbit://user:pass@192.168.1.17:5672"
      concurrent_sessions: 3
      region: RegionOne
      context: uniview
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        #max_attempts: 3
        window: 120s
    restart: always
